// std_msgs/Header header

// string[] name
// float64[] position
// float64[] velocity
// float64[] effort

syntax = "proto3";
package humanoid_robot.PB.ros2.sensor_msgs;

import "ros2/std_msgs/Header.proto";


message JointState {
  ros2.std_msgs.Header header = 1;
  repeated string name = 2;
  repeated double position = 3;
  repeated double velocity = 4;
  repeated double effort = 5;
}

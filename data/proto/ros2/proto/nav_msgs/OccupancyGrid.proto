syntax = "proto3";
package humanoid_robot.PB.ros2.nav_msgs;

// 依赖标准消息类型
import "ros2/std_msgs/Header.proto";
import "ros2/nav_msgs/MapMetaData.proto";

// 对应nav_msgs/OccupancyGrid.msg
message OccupancyGrid {
  ros2.std_msgs.Header header = 1; // 消息头
  ros2.nav_msgs.MapMetaData info = 2;                              // 地图元数据
  repeated int32 data = 3;                            // 占用概率数据（-1:未知, 0-100:占用概率）
}
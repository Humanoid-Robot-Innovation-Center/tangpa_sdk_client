

syntax = "proto3";
package humanoid_robot.PB.ros2.nav2_msgs;

// #goal definition
// geometry_msgs/PoseStamped pose
// string behavior_tree
// ---
// #result definition
// std_msgs/Empty result
// ---
// #feedback definition
// geometry_msgs/PoseStamped current_pose
// builtin_interfaces/Duration navigation_time
// builtin_interfaces/Duration estimated_time_remaining
// int16 number_of_recoveries
// float32 distance_remaining


import "ros2/geometry_msgs/PoseStamped.proto";
import "ros2/std_msgs/Empty.proto";
import "ros2/builtin_interfaces/Duration.proto";

// 自定义的nav2_msgs/ActionNavigateToPose（导航到目标位姿）

message ActionNavigateToPoseGoal {
    ros2.geometry_msgs.PoseStamped pose = 1;
    string behavior_tree = 2;
}

message ActionNavigateToPoseResult {
    ros2.std_msgs.Empty result = 1;
}

message ActionNavigateToPoseFeedback {
    ros2.geometry_msgs.PoseStamped current_pose = 1;
    ros2.builtin_interfaces.Duration navigation_time = 2;
    ros2.builtin_interfaces.Duration estimated_time_remaining = 3;
    int32 number_of_recoveries = 4;
    float distance_remaining = 5;
}
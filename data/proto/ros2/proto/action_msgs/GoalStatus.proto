syntax = "proto3";
package humanoid_robot.PB.ros2.action_msgs;

import "ros2/action_msgs/GoalInfo.proto";
// 对应action_msgs/GoalStatus.msg
message GoalStatus {
  // ROS GoalStatus的状态码枚举
  enum StatusCode {
    STATUS_UNKNOWN = 0;
    STATUS_ACCEPTED = 1;
    STATUS_EXECUTING = 2;
    STATUS_CANCELING = 3;
    STATUS_SUCCEEDED = 4;
    STATUS_CANCELED = 5;
    STATUS_ABORTED = 6;
  }
  GoalInfo goal_info = 1;  // 目标ID
  int32 status = 2;   // 状态码
}
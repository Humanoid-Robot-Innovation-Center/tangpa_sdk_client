syntax = "proto3";
package humanoid_robot.PB.ros2.diagnostic_msgs;

import "ros2/diagnostic_msgs/KeyValue.proto";

message DiagnosticStatus {
  enum Level {
    OK = 0;
    WARN = 1;
    ERROR = 2;
    STALE = 3;
  }

  Level level = 1;
  string name = 2;
  string message = 3;
  string hardware_id = 4;
  repeated KeyValue values = 5;
}

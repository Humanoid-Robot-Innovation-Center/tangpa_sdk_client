syntax = "proto3";
package humanoid_robot.PB.ros2.geometry_msgs;

// 依赖Point和Quaternion，需import
import "ros2/geometry_msgs/Point.proto";
import "ros2/geometry_msgs/Quaternion.proto";

// 对应geometry_msgs/Pose.msg
message Pose {
  ros2.geometry_msgs.Point position = 1;
  ros2.geometry_msgs.Quaternion orientation = 2;
}
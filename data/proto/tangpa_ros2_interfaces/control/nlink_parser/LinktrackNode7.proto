syntax = "proto3";
package humanoid_robot.PB.tangpa_ros2_interfaces.control.nlink_parser;

// UWB 单个节点信息
message LinktrackNode7 {
    uint32 role = 1;          // 节点角色
    uint32 id = 2;           // 节点 ID
    float dis = 3;           // 距离 distance
    float angle0 = 4;        // 方位角/俯仰角
    float angle1 = 5;        // 方位角/俯仰角
    float fp_rssi = 6;       // First Path RSSI（首径信号强度）
    float rx_rssi = 7;       // Receive RSSI（接收总信号强度）
}
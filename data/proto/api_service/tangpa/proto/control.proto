message UWBRequestConfig {
    int32 target_role = 1;
    double target_distance = 2;
}



message UWBRequestHardware {
    string target_device = 1;
    int32 target_role = 2;
    int32 baud = 3;
}



message UWBRequest {
    string target_device = 1;
    int32 target_role = 2;
    int32 baud = 3;
}


message MotorCalibrationRequest {
    uint32 motor_id = 1;
}

message MotorCalibrationResponse {
    string state = 1; // 标定状态 idle/running/succeeded/failed/rejected
    uint32 motor_id = 2; // 电机ID
    string message = 3; // 进度、失败或拒绝原因
}

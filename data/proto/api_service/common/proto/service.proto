syntax = "proto3";

// 包名（避免命名冲突，可根据项目修改）
package humanoid_robot.PB.api_service.common;

enum CommandCode {
    KUnknownCommand = 0x0; // 未知命令
}

enum PerceptionCommandCode {
    kUnknownPerceptionCommand = 0x0; // 未知命令

    kGetPerceptionResult = 0x02000101; // 获取感知结果
    kGetDetectionResult = 0x02000102; // 获取检测结果
    kGetDivisionResult = 0x02000103; // 获取分割结果

    kVoiceASRConfig = 0x02000201; // 语音调用配置
    kVoiceASRStream = 0x02000202; // 语音识别调用
    kVoiceTTSConfig = 0x02000203; // 语言合成配置
    kVoiceTTS = 0x02000204; // 语言合成配置
    
    kBrainConfig = 0x02000301; // 大脑配置
    kBrainSwitch = 0x02000302; // 关闭开启大脑

    kPerceptionConfig = 0x02000401;  // 感知配置
    kPerceptionResult = 0x02000402;  // 感知结果
}

enum NavigationCommandCode {
    kUnknownNavigationCommand = 0x0; // 未知命令

    kGetCurrentPose = 0x01000101; // 获取当前位姿
    kGetGridMap2D = 0x01000102; // 获取2D格栅地图
    
    kNavigationTo = 0x01000201; // 开始导航
    kCancelNavigationTask = 0x01000202; // 取消当前导航任务
    kGetRemainingPathDistance  = 0x01000203; // 获取剩余路径距离

    kStartCharging = 0x01000204; // 开始充电
    kStopCharging = 0x01000205; // 结束充电
}

enum ControlCommandCode {
    KUnknownControlCommand = 0x0; // 未知命令

    kEmergencyStop = 0x04000101; // 紧急停止
    kGetJointInfo = 0x04000201; // 获取关节信息
    
    kJointMotion = 0x04000102; // 关节运动控制
    kNodAction = 0x04000103; // 执行点头
    kGrabAction = 0x04000104; // 执行抓取

    // 原TangpaCommandCode全部剩余控制/流式/订阅指令迁移至此，模块码04不变，分组顺延
    kGetImuData = 0x04000301; // 获取IMU 数据
    kGetImuDataStream = 0x04000302; // 获取IMU 数据流
    kJointStateStream = 0x04000303; // 获取关节状态数据流
    kGetJoyDataStream = 0x04000304; // 获取手柄数据流

    kJoyControl = 0x04000401; // 手柄控制
    kMotorControl = 0x04000402; // 电机控制
    kSetUWBConfigurator = 0x04000403; // UWB跟随(硬件设置)
    kSetUWBConfigManager = 0x04000404; // UWB跟随
    kMotorControlStream = 0x04000405;  // 电机流式控制命令下发
    kMotorCalibration = 0x04000406; // 电机标定命令

    kSubscribeImuData = 0x04000501;  // 订阅 IMU 数据
    kSubscribeJoyData = 0x04000502;  // 订阅 JOY 数据
    kSubscribeJointState = 0x04000503;  // 订阅关节状态数据

    kEnableZenohStream = 0x04000504;
    kDisableZenohStream = 0x04000505;
}

enum SystemCommandCode{
    KUnknownSystemCommand = 0x0; // 未知命令

    //ccu2 提供的查询服务
    kGetBatteryInfo = 0x07000101; //获取电池信息
    kSubscribeInfraredChargingInfo = 0x07000102; // 订阅红外回充状态
    kGetPowerInfo = 0x07000103; // 获取电源状态信息
    kGetLightInfo = 0x07000104; // 获取灯光信息
    kGetFanInfo = 0x07000105; // 获取风扇状态信息
    kSubscribeUltrasonicInfo = 0x07000106; // 订阅超声波避障传感器距离数据
    kGetTemperatureAndLightSensorInfo = 0x07000107; // 获取温敏光敏探头值
    kGetDip = 0x07000108; // 获取拔码开关值
    kGetSwitchStatus = 0x07000109; // 获取开关状态

    // 迁移自TangpaCommandCode 设备状态查询类，模块码07不变，分组01顺延新增
    kGetDiagnosticData = 0x07000110; // 获取诊断数据
    kGetRobotStatus = 0x07000111; // 获取机器人整机状态
    kGetBatteryPercentage = 0x07000112; // 获取电池电量百分比

    // ccu2 提供的控制服务
    kControlPower = 0x07000201; // 控制电源
    kControlLight = 0x07000202; // 控制LED灯光
    kControlFan = 0x07000203;   // 控制风扇
    kControlSwitch = 0x07000204; // 控制开关
}
